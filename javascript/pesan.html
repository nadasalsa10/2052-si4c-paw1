<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kirim Pesan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  </head>
  <body>
    <div class="container text-center d-flex justify-content-center align-items-center min-vh-100 max-vh-100 flex-column">
      <h1>Kirim Pesan</h1>

      <div class="mb-3 w-50 mx-auto row">
        <div class="col-6">
          <input type="text" class="form-control" name="nama" id="nama" aria-describedby="helpId" placeholder="Masukan nama kamu..." />
        </div>
        <div class="col-6">
          <input type="text" class="form-control" name="saran" id="saran" aria-describedby="helpId" placeholder="Masukan saran kamu..." />
        </div>
      </div>

      <button class="btn btn-primary" type="button" onclick="kirimPesan()">Kirim</button>

      <div class="container mt-4 text-start row d-flex justify-content-center align-items-center">
        <div class="table-responsive col-6">
          <table class="table table-primary">
            <thead>
              <tr>
                <th>Nama</th>
                <th>Saran</th>
              </tr>
            </thead>
            <tbody id="dataPesan"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
